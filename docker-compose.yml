# Brand Sentiment Analysis — local dev stack
#
# Usage:
#   cp infra/.env.example .env
#   docker compose up -d
#
# Phase 1 ships with: postgres, minio, mlflow, airflow, api, dashboard.
# Each service Dockerfile lives in infra/docker/<service>/Dockerfile.

x-pipeline-env: &pipeline-env
  # Container paths — match the raw-data volume targets above.
  YELP_TAR_PATH: /data/raw/yelp/yelp_dataset/yelp_dataset
  TRIPADVISOR_CSV_PATH: /data/raw/tripadvisor/TripAdvisor_data_cleaned.csv
  PYTHONPATH: /opt/project

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: infra/docker/airflow/Dockerfile
  env_file: .env
  environment:
    <<: *pipeline-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # In-network service hosts are the compose aliases — hard-code them so a host-side
    # script that exports POSTGRES_HOST=localhost (for its own psycopg2) can't leak into
    # the airflow containers via ${...} interpolation at `docker compose up` time.
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_HOST: postgres
    POSTGRES_PORT: ${POSTGRES_PORT}
    POSTGRES_DB: ${POSTGRES_DB}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./models:/opt/project/models
    - ./data:/opt/project/data
    - ./monitoring:/opt/project/monitoring
    - ${YELP_DATA_HOST:-../../Yelp_JSON}:/data/raw/yelp:ro
    - ${TRIPADVISOR_DATA_HOST:-../../TripAdvisor_data_cleaned.csv}:/data/raw/tripadvisor:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    container_name: sentiment-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: sentiment-minio
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 10

  minio-init:
    # Creates the buckets we need on first boot.
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY};
      mc mb -p local/mlflow || true;
      mc mb -p local/monitoring || true;
      mc mb -p local/datasets || true;
      "

  mlflow:
    build:
      context: .
      dockerfile: infra/docker/mlflow/Dockerfile
    container_name: sentiment-mlflow
    env_file: .env
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      --default-artifact-root s3://mlflow/
    ports:
      # Host 5001 because macOS Control Center (AirPlay Receiver) owns
      # port 5000 by default. Container-internal port stays 5000, so
      # MLFLOW_TRACKING_URI=http://mlflow:5000 still works for services
      # on the docker network.
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: sentiment-airflow-init
    entrypoint: >
      /bin/bash -c "
      airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USER:-airflow}
      --password ${AIRFLOW_ADMIN_PASSWORD:-airflow}
      --firstname admin --lastname admin
      --role Admin --email admin@example.com || true
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: sentiment-airflow-web
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: sentiment-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    container_name: sentiment-api
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MODEL_NAME: ${MODEL_NAME}
      MODEL_STAGE: ${MODEL_STAGE}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard/Dockerfile
    container_name: sentiment-dashboard
    env_file: .env
    environment:
      API_URL: http://api:8000
      POSTGRES_HOST: postgres
    ports:
      - "8501:8501"
    # The marketing dashboard reads the reviews table from Postgres directly; it does
    # not need the API to render. (The MLOps-monitor page calls the API but degrades
    # gracefully when it's down.) Depend on Postgres so the dashboard is independent.
    depends_on:
      postgres:
        condition: service_healthy

  smoke:
    # Phase 1 smoke test. Runs tests/test_smoke.py in an isolated container
    # with no other services required. Hidden behind a profile so it doesn't
    # start with `docker compose up` — run it explicitly:
    #   docker compose run --rm smoke
    build:
      context: .
      dockerfile: infra/docker/smoke/Dockerfile
    container_name: sentiment-smoke
    profiles: ["smoke"]

  data-pipeline:
    # Medallion driver: bronze → silver → GE gate → gold.
    # Does NOT start with `docker compose up` — run on demand:
    #   docker compose run --rm data-pipeline --run-date 2026-06-10 --sources yelp tripadvisor
    #   .\scripts\run_daily_docker.ps1
    build:
      context: .
      dockerfile: infra/docker/data-pipeline/Dockerfile
    env_file: .env
    environment:
      <<: *pipeline-env
    volumes:
      - ./data:/opt/project/data
      - ${YELP_DATA_HOST:-../../Yelp_JSON}:/data/raw/yelp:ro
      - ${TRIPADVISOR_DATA_HOST:-../../TripAdvisor_data_cleaned.csv}:/data/raw/tripadvisor:ro
    # Up postgres + minio first so `--publish` can reach them on the docker network.
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    profiles: ["pipeline"]

volumes:
  pg_data:
  minio_data:
