# Brand Sentiment Analysis — local dev stack
#
# Usage:
#   cp infra/.env.example .env
#   docker compose up -d
#
# Phase 1 ships with: postgres, minio, mlflow, airflow, api, dashboard.
# Each service Dockerfile lives in infra/docker/<service>/Dockerfile.

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: infra/docker/airflow/Dockerfile
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    # Lets DAGs do `from data.ingest... import ...` / `from models... import ...`.
    PYTHONPATH: /opt/project
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_HOST: ${POSTGRES_HOST}
    POSTGRES_PORT: ${POSTGRES_PORT}
    POSTGRES_DB: ${POSTGRES_DB}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./models:/opt/project/models
    - ./data:/opt/project/data
    - ./monitoring:/opt/project/monitoring
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    container_name: sentiment-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      # Default dbname for pg_isready is the username; our DB is POSTGRES_DB (sentiment).
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: sentiment-minio
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 10

  minio-init:
    # Creates the buckets we need on first boot.
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY};
      mc mb -p local/mlflow || true;
      mc mb -p local/monitoring || true;
      mc mb -p local/datasets || true;
      "

  mlflow:
    build:
      context: .
      dockerfile: infra/docker/mlflow/Dockerfile
    container_name: sentiment-mlflow
    env_file: .env
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      --default-artifact-root s3://mlflow/
    ports:
      # Host 5001 because macOS Control Center (AirPlay Receiver) owns
      # port 5000 by default. Container-internal port stays 5000, so
      # MLFLOW_TRACKING_URI=http://mlflow:5000 still works for services
      # on the docker network.
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: sentiment-airflow-init
    entrypoint: >
      /bin/bash -c "
      airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USER:-airflow}
      --password ${AIRFLOW_ADMIN_PASSWORD:-airflow}
      --firstname admin --lastname admin
      --role Admin --email admin@example.com || true
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: sentiment-airflow-web
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: sentiment-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    container_name: sentiment-api
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MODEL_NAME: ${MODEL_NAME}
      MODEL_STAGE: ${MODEL_STAGE}
      SHADOW_MODEL_NAME: ${SHADOW_MODEL_NAME}
      SHADOW_MODEL_STAGE: ${SHADOW_MODEL_STAGE}
      LOG_PREDICTIONS: ${LOG_PREDICTIONS:-1}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard/Dockerfile
    container_name: sentiment-dashboard
    env_file: .env
    environment:
      API_URL: http://api:8000
      POSTGRES_HOST: postgres
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_started

  smoke:
    # Phase 1 smoke test. Runs tests/test_smoke.py in an isolated container
    # with no other services required. Hidden behind a profile so it doesn't
    # start with `docker compose up` — run it explicitly:
    #   docker compose run --rm smoke
    build:
      context: .
      dockerfile: infra/docker/smoke/Dockerfile
    container_name: sentiment-smoke
    profiles: ["smoke"]

volumes:
  pg_data:
  minio_data:
